services:
  meilisearch:
    image: getmeili/meilisearch:v1.11
    container_name: sdk-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_ENV: development
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-sdk-dev-master-key}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data

volumes:
  meili_data:
