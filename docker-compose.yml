services:
  meilisearch:
    image: getmeili/meilisearch:v1.42.1
    restart: unless-stopped
    ports:
      - "${MEILI_PORT:-7700}:7700"
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-api-dev-master-key}
      MEILI_NO_ANALYTICS: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'wget -q -O - http://127.0.0.1:7700/health | grep -q ''"status":"available"''',
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - meili_data:/meili_data

  fumadocs:
    build:
      context: .
      dockerfile: apps/fumadocs/Dockerfile
      args:
        APP_BASE_URL: ${APP_BASE_URL:-http://localhost:${FUMADOCS_PORT:-4000}}
        NEXT_PUBLIC_APP_BASE_URL: ${NEXT_PUBLIC_APP_BASE_URL:-http://localhost:${FUMADOCS_PORT:-4000}}
    restart: unless-stopped
    depends_on:
      meilisearch:
        condition: service_healthy
    ports:
      - "${FUMADOCS_PORT:-4000}:4000"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || '4000') + '/api/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 120s
    volumes:
      - fumadocs_api_generated:/app/content/api-generated
      - fumadocs_api_entities:/app/data/api/entities
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 4000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:${FUMADOCS_PORT:-4000}}
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: ${NEXT_PUBLIC_UMAMI_WEBSITE_ID:-}
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: ${NEXT_PUBLIC_UMAMI_SCRIPT_URL:-}
      NEXT_PUBLIC_UMAMI_HOST_URL: ${NEXT_PUBLIC_UMAMI_HOST_URL:-}
      NEXT_PUBLIC_UMAMI_DOMAINS: ${NEXT_PUBLIC_UMAMI_DOMAINS:-}
      NEXT_PUBLIC_UMAMI_TAG: ${NEXT_PUBLIC_UMAMI_TAG:-docs}
      API_JSON_URL: ${API_JSON_URL:-https://cdn.sbox.game/releases/2026-03-05-14-31-39.zip.json}
      API_JSON_DOWNLOAD_TIMEOUT_MS: ${API_JSON_DOWNLOAD_TIMEOUT_MS:-45000}
      API_JSON_DOWNLOAD_ATTEMPTS: ${API_JSON_DOWNLOAD_ATTEMPTS:-3}
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_MASTER_KEY:-api-dev-master-key}
      MEILI_API_INDEX_NAME: ${MEILI_API_INDEX_NAME:-api_entities}
      MEILI_ENABLE_HYBRID: ${MEILI_ENABLE_HYBRID:-false}
      MEILI_SEMANTIC_RATIO: ${MEILI_SEMANTIC_RATIO:-0.35}
      MEILI_EMBEDDER_PROVIDER: ${MEILI_EMBEDDER_PROVIDER:-openai}
      MEILI_EMBEDDER_MODEL: ${MEILI_EMBEDDER_MODEL:-text-embedding-3-small}
      API_LOGGING: ${API_LOGGING:-false}
      API_RAG_PROVIDER: ${API_RAG_PROVIDER:-openai}
      API_RAG_MODEL: ${API_RAG_MODEL:-gpt-4.1-mini}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      CHUTES_API_KEY: ${CHUTES_API_KEY:-}
      CHUTES_API_BASE_URL: ${CHUTES_API_BASE_URL:-}

  fumadocs-indexer:
    build:
      context: .
      dockerfile: apps/fumadocs/Dockerfile
      args:
        APP_BASE_URL: ${APP_BASE_URL:-http://localhost:${FUMADOCS_PORT:-4000}}
        NEXT_PUBLIC_APP_BASE_URL: ${NEXT_PUBLIC_APP_BASE_URL:-http://localhost:${FUMADOCS_PORT:-4000}}
    restart: "no"
    depends_on:
      fumadocs:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    command: ["bun", "run", "api:index"]
    volumes:
      - fumadocs_api_generated:/app/content/api-generated
      - fumadocs_api_entities:/app/data/api/entities
    environment:
      NODE_ENV: production
      API_JSON_URL: ${API_JSON_URL:-https://cdn.sbox.game/releases/2026-03-05-14-31-39.zip.json}
      API_JSON_DOWNLOAD_TIMEOUT_MS: ${API_JSON_DOWNLOAD_TIMEOUT_MS:-45000}
      API_JSON_DOWNLOAD_ATTEMPTS: ${API_JSON_DOWNLOAD_ATTEMPTS:-3}
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_MASTER_KEY:-api-dev-master-key}
      MEILI_API_INDEX_NAME: ${MEILI_API_INDEX_NAME:-api_entities}
      MEILI_ENABLE_HYBRID: ${MEILI_ENABLE_HYBRID:-false}
      MEILI_SEMANTIC_RATIO: ${MEILI_SEMANTIC_RATIO:-0.35}
      MEILI_EMBEDDER_PROVIDER: ${MEILI_EMBEDDER_PROVIDER:-openai}
      MEILI_EMBEDDER_MODEL: ${MEILI_EMBEDDER_MODEL:-text-embedding-3-small}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE_URL: ${OPENAI_API_BASE_URL:-https://api.openai.com/v1}
      CHUTES_API_KEY: ${CHUTES_API_KEY:-}
      CHUTES_API_BASE_URL: ${CHUTES_API_BASE_URL:-}

volumes:
  meili_data:
  fumadocs_api_generated:
  fumadocs_api_entities:
